services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - .:/app
    entrypoint: []
    command:
      - "sh"
      - "-c"
      - "uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      - mongo

volumes:
  mongo_data:
